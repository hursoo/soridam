---
layout: default
---

<section class="hero">
  <div class="container">
    <p class="eyebrow" data-i18n="hero.eyebrow"></p>
    <h1 class="hero-name">
      <span class="hero-name-main" data-i18n="hero.name"></span>
      <span class="hero-name-alt" data-i18n="hero.name_alt"></span>
    </h1>
    <p class="hero-tagline" data-i18n="hero.tagline"></p>
  </div>
</section>

<section id="about" class="section">
  <div class="container">
    <h2 data-i18n="about.title"></h2>
    <p data-i18n="about.body"></p>
  </div>
</section>

<section id="name" class="section section-alt">
  <div class="container">
    <h2 data-i18n="name.title"></h2>
    <p data-i18n="name.body_korean"></p>
    <p data-i18n="name.body_hanja"></p>
  </div>
</section>

<section id="gayangju" class="section">
  <div class="container">
    <h2 data-i18n="gayangju.title"></h2>
    <p data-i18n="gayangju.body"></p>
  </div>
</section>

<section id="brewing" class="section section-alt">
  <div class="container">
    <h2 data-i18n="brewing.title"></h2>
    <p class="meta" data-i18n="brewing.meta"></p>
    <p data-i18n="brewing.intro"></p>
    <ol class="steps" data-i18n-list="brewing.steps"></ol>
  </div>
</section>

<section id="brewer" class="section">
  <div class="container">
    <h2 data-i18n="brewer.title"></h2>
    <p class="brewer-name">
      <span data-i18n="brewer.name"></span>
      <span class="brewer-name-alt" data-i18n="brewer.name_alt"></span>
    </p>
    <p class="brewer-role" data-i18n="brewer.role"></p>
  </div>
</section>

<section id="studio" class="section section-alt">
  <div class="container">
    <h2 data-i18n="studio.title"></h2>
    <p data-i18n="studio.body"></p>
  </div>
</section>

<section id="award" class="section">
  <div class="container">
    <h2 data-i18n="award.title"></h2>
    <p class="award-headline" data-i18n="award.headline"></p>
    <p class="meta" data-i18n="award.detail"></p>
    <p data-i18n="award.description"></p>
    <p>
      <a class="link" data-i18n="award.press_label" data-i18n-href="award.press_url" target="_blank" rel="noopener"></a>
    </p>
  </div>
</section>

<section id="donation" class="section section-alt">
  <div class="container">
    <h2 data-i18n="donation.title"></h2>
    <p data-i18n="donation.body"></p>
    <p>
      <a class="link" data-i18n="donation.link_label" data-i18n-href="donation.link_url" target="_blank" rel="noopener"></a>
    </p>
  </div>
</section>
